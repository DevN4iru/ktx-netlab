[colors]
bg = #E62B213D
bg-alt = #F03B2C57
fg = #F7F0FF
muted = #B8A9D9
accent = #8E24AA
accent2 = #5E35B1
cyan = #7DD3FC
red = #F87171

[bar/ktx]
width = 100%
height = 19pt
offset-x = 0
offset-y = 0
radius = 0
fixed-center = true
bottom = false

background = ${colors.bg}
foreground = ${colors.fg}

line-size = 1pt
line-color = ${colors.accent}
border-size = 0

padding-left = 1
padding-right = 1
module-margin-left = 1
module-margin-right = 1

font-0 = JetBrainsMono Nerd Font:size=8;2
font-1 = JetBrainsMono Nerd Font:size=9;2

modules-left = launcher i3
modules-center = xwindow
modules-right = tray network cpu memory filesystem battery date power

wm-restack = i3
enable-ipc = true
override-redirect = false

[module/launcher]
type = custom/text
content = 󰀻
content-foreground = ${colors.fg}
click-left = rofi -show drun -show-icons
click-right = /usr/local/bin/ktx-terminal

[module/i3]
type = internal/i3
pin-workspaces = true
index-sort = true
strip-wsnumbers = false
enable-click = true
enable-scroll = true

label-focused = %index%
label-focused-background = ${colors.fg}
label-focused-foreground = #2B213D
label-focused-padding = 2

label-unfocused = %index%
label-unfocused-foreground = ${colors.muted}
label-unfocused-padding = 2

label-visible = %index%
label-visible-foreground = ${colors.cyan}
label-visible-padding = 2

label-urgent = %index%
label-urgent-background = ${colors.red}
label-urgent-foreground = #2B213D
label-urgent-padding = 2

[module/xwindow]
type = internal/xwindow
label = %title:0:42:...%
label-empty = KTX NetLab
label-foreground = ${colors.muted}

[module/tray]
type = internal/tray
format = <tray>
tray-spacing = 6px
tray-size = 14

[module/network]
type = internal/network
interface = enp19s0
interval = 3
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-connected = 󰈀 %local_ip%
label-connected-foreground = ${colors.fg}
label-disconnected = 󰈂 offline
label-disconnected-foreground = ${colors.red}

[module/cpu]
type = internal/cpu
interval = 2
label = 󰻠 %percentage%%
label-foreground = ${colors.fg}

[module/memory]
type = internal/memory
interval = 2
label = 󰍛 %percentage_used%%
label-foreground = ${colors.fg}

[module/filesystem]
type = internal/fs
interval = 10
mount-0 = /
label-mounted = 󰋊 %free%
label-mounted-foreground = ${colors.fg}


[module/battery]
type = internal/battery
battery = BAT0
adapter = AC
poll-interval = 5
format-charging = <label-charging>
format-discharging = <label-discharging>
format-full = <label-full>
label-charging = 󰂄 %percentage%%
label-discharging = 󰁹 %percentage%%
label-full = 󰁹 %percentage%%
label-charging-foreground = ${colors.fg}
label-discharging-foreground = ${colors.fg}
label-full-foreground = ${colors.fg}


[module/date]
type = internal/date
interval = 1
date = %d %b
time = %H:%M
label = 󰥔 %time%
label-alt = 󰥔 %date% %time%
label-foreground = ${colors.fg}

[module/power]
type = custom/text
content = ⏻
content-foreground = ${colors.fg}
click-left = /usr/local/bin/ktx-i3-power
