backend = "xrender";
vsync = false;
use-damage = false;

detect-client-opacity = true;
detect-transient = true;
detect-client-leader = true;

shadow = false;
fading = false;
animations = false;

inactive-opacity = 1.0;
active-opacity = 1.0;
frame-opacity = 1.0;

opacity-rule = [
  "72:class_g = 'Xfce4-terminal'",
  "72:name *= 'KTX Terminal'"
];

log-level = "warn";
